name: CI

on:
  push:
  workflow_dispatch:

jobs:
  app:
    name: Typecheck & renderer tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

  sidecar:
    name: Sidecar tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sidecar
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: sidecar/pyproject.toml

      - name: Install sidecar with test extras
        run: pip install -e ".[test]"

      - name: Run tests
        run: pytest
