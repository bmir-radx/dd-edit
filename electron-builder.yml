# Installer packaging (DESIGN.md milestone 5): the electron-vite output plus
# the PyInstaller one-dir sidecar as an extra resource. Build with `npm run
# dist` (which builds both first).
appId: org.bmir.dd-edit
productName: dd-edit
directories:
  output: release
  # Icons live here: build/icon.icns (mac), build/icon.ico (win),
  # build/icon.png (linux + runtime window icon). electron-builder picks these
  # up automatically by name; the per-platform icon: keys below are explicit.
  buildResources: build
files:
  - out/**
  - package.json
extraResources:
  # The sidecar bundle lands at <app>/Contents/Resources/sidecar/ with the
  # executable at sidecar/dd-edit-sidecar — matching sidecarCommand() in
  # src/main/index.ts for the packaged case.
  - from: sidecar/dist/dd-edit-sidecar
    to: sidecar
  # Ship the PNG icon so the Windows/Linux window/taskbar icon resolves at
  # runtime (appIcon() in src/main/index.ts reads it from resources/build/).
  - from: build/icon.png
    to: build/icon.png
mac:
  category: public.app-category.developer-tools
  icon: build/icon.icns
  target:
    - target: dmg
    - target: zip
  # Unsigned for now: distribution inside the group. First launch needs
  # right-click > Open (Gatekeeper); signing/notarization can come later.
  identity: null
win:
  # NSIS installer, unsigned for now: SmartScreen will warn on first run
  # ("More info" > "Run anyway"). The Windows sidecar binary must be built
  # ON Windows (PyInstaller does not cross-compile) — see the Release
  # Installers workflow, which builds every platform.
  icon: build/icon.ico
  target:
    - target: nsis
linux:
  # AppImage: single-file, runs on any distribution, no packaging metadata
  # required. As with Windows, the Linux sidecar binary must be built on
  # Linux — the Release Installers workflow covers it.
  category: Development
  icon: build/icon.png
  target:
    - target: AppImage
npmRebuild: false
