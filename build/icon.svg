<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="ds" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#0b2a63" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- App tile -->
  <g filter="url(#ds)">
    <rect x="112" y="112" width="800" height="800" rx="180" fill="url(#tile)"/>
    <rect x="112" y="112" width="800" height="800" rx="180" fill="url(#sheen)"/>
  </g>

  <!-- Spreadsheet card -->
  <g>
    <rect x="248" y="286" width="528" height="452" rx="40" fill="#ffffff"/>

    <!-- Header row band -->
    <path d="M248 326 a40 40 0 0 1 40 -40 h448 a40 40 0 0 1 40 40 v56 h-528 z" fill="#dbe7ff"/>

    <!-- Grid lines -->
    <g stroke="#c9d6ec" stroke-width="6" stroke-linecap="round">
      <!-- vertical -->
      <line x1="424" y1="286" x2="424" y2="738"/>
      <line x1="600" y1="286" x2="600" y2="738"/>
      <!-- horizontal -->
      <line x1="248" y1="470" x2="776" y2="470"/>
      <line x1="248" y1="570" x2="776" y2="570"/>
      <line x1="248" y1="670" x2="776" y2="670"/>
    </g>

    <!-- Highlighted / selected cell being edited -->
    <rect x="424" y="470" width="176" height="100" fill="#2563eb" fill-opacity="0.12"/>
    <rect x="424" y="470" width="176" height="100" fill="none" stroke="#2563eb" stroke-width="9"/>

    <!-- Edit caret in the selected cell -->
    <rect x="506" y="492" width="9" height="56" rx="4" fill="#2563eb"/>

    <!-- Card outline -->
    <rect x="248" y="286" width="528" height="452" rx="40" fill="none" stroke="#b9cbe8" stroke-width="6"/>
  </g>

  <!-- dd monogram in header band -->
  <g fill="#2563eb" font-family="Geist Mono, SFMono-Regular, Menlo, monospace" font-weight="700">
    <text x="300" y="356" font-size="64" letter-spacing="-2">dd</text>
  </g>
</svg>
